<div class="content-block dx-card responsive-paddings">
  <dx-data-grid
    id="gridContainer"
    [dataSource]="users"
    [showBorders]="true"
  >
  <dxo-editing
      mode="form"
      [allowUpdating]="true"
      [allowAdding]="true"
      [allowDeleting]="true"
      [refreshMode]="refreshMode"
    >
    <dxo-form>
      <dxi-item dataField="username"></dxi-item>
      <dxi-item dataField="role" editorType="dxTagBox" 
        [editorOptions]="{ items: roles, searchEnabled: true}">
      </dxi-item>
    </dxo-form>
  </dxo-editing>

    <dxi-column dataField="username" dataType="string"> </dxi-column>
    <dxi-column dataField="name" dataType="string"> </dxi-column>
    <dxi-column dataField="dept" dataType="string"> </dxi-column>
    <dxi-column dataField="role" dataType="string" editorType="dxTagBox" 
    [editorOptions]="{ items: roles, searchEnabled: true}"> 
    <!-- <dxo-tag-box [dataSource]="roles"></dxo-tag-box> -->
  </dxi-column>
    <!-- <dxi-column type="buttons" caption="Reset">
      <dxi-button name="reset-password" text="Reset" stylingMode="outlined"
      type="success"  (onItemClick)="click($event)"></dxi-button>
    </dxi-column> -->
  </dx-data-grid>


<!--   <div>{{ users | json}}</div> -->
</div>
