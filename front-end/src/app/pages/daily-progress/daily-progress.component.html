<!-- <h2 class="content-block">Daily Progress</h2> -->
<div class="content-block">
    <div class="dx-card responsive-paddings">
        <dx-toolbar>
            <dxi-item
              location="before"
              widget="dxButton"
              locateInMenu="auto"
              [options]="refreshButtonOptions"
            >
            </dxi-item>

            <dxi-item location="center" widget="dxButton" locateInMenu="never">
              <div *dxTemplate>
                <div class="toolbar-label"><b>Daily Progress PUR 1-2</b></div>
              </div>
            </dxi-item>
          
            <dxi-item
              location="after"
              widget="dxSelectBox"
              locateInMenu="auto"
              [options]="selectBoxOptions"
            >
            </dxi-item>

          </dx-toolbar>
        <dx-data-grid
        id="gridContainer"
        [dataSource]="customers"
        keyExpr="ID"
        [allowColumnReordering]="true"
        [showBorders]="true">
        <dxi-column dataField="system_download" cellTemplate="celldw"></dxi-column>
        <!-- <div *dxTemplate="let cellf of 'celldw'">
          <div  [ngClass]="cellSt_CheckStyles(cellf.text)">{{cellf.text}}</div>
        </div> -->
        <dxi-column dataField="Buyer_input" cellTemplate="celldw"></dxi-column>
        <dxi-column dataField="Leader_check" cellTemplate="celldw"></dxi-column>
        <dxi-column dataField="Manager_check" cellTemplate="celldw"></dxi-column>
        <dxi-column dataField="other_dept_check" cellTemplate="celldw"></dxi-column>
        <dxi-column dataField="purc_check" cellTemplate="celldw"></dxi-column>
        <dxi-column dataField="subject" [groupIndex]="0"></dxi-column>

        <div *dxTemplate="let cellf of 'celldw'">
          <div  [ngClass]="cellSt_CheckStyles(cellf.text)">{{cellf.text}}</div>
        </div>

        <dxo-search-panel [visible]="true"></dxo-search-panel>
        <dxo-paging [pageSize]="15"></dxo-paging>
        <dxo-group-panel [visible]="true"></dxo-group-panel>
        <dxo-grouping #expand [autoExpandAll]="true"></dxo-grouping>
        </dx-data-grid>
    </div>
</div>
